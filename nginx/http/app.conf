# Plain-HTTP reverse proxy for the Samwise portal (the "http" compose profile).
# Serves the app on port 80 so you reach it at http://<host>/ without :8080.
# No TLS — only use behind a private network (VPN/Tailscale) or for testing;
# over the open internet credentials travel in the clear. Mounted directly to
# conf.d (no envsubst), so server_name matches any host (IP or domain).
server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 25m;   # allow agent file attachments
    proxy_read_timeout   300s;  # long agent runs

    location / {
        proxy_pass http://orchestrator:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stream chat responses (newline-delimited JSON) without buffering.
        proxy_buffering off;
        proxy_set_header Connection "";
    }
}
